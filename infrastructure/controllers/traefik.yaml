---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-release
  namespace: kube-system
spec:
  interval: 1m0s
  chart:
    spec:
      chart: traefik
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: traefik-charts
        namespace: flux-system
      version: 40.0.0
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    ingressClass:
      enabled: true
      isDefaultClass: true
    ingressRoute:
      dashboard:
        enabled: true
        insecure: true
    providers:
      kubernetesIngress:
        enabled: true
      kubernetesCRD:
        enabled: true
        allowCrossNamespace: true
    ports:
      web:
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
              permanent: true
      websecure:
        http:
          tls:
            enabled: true
        transport:
          respondingTimeouts:
            readTimeout: 3600s
            idleTimeout: 3600s
            writeTimeout: 3600s
        http3:
          enabled: true
    tlsStore:
      default:
        certificates:
          - secretName: wildcard-tls
        defaultCertificate:
          secretName: wildcard-tls

    metrics:
      prometheus:
        enabled: true
        addRoutersLabels: true
        serviceMonitor:
          enabled: true
          namespace: kube-system
          honorLabels: true
