apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ingress-control
  namespace: flux-system
spec:
  dependsOn:
    - name: traefik
  interval: 5m
  path: ./kube-system/traefik/ingress-control
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
