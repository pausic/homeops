---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tor-socks-proxy
  namespace: networking
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      main:
        strategy: Recreate
        containers:
          main:
            image:
              repository: peterdavehello/tor-socks-proxy
              tag: latest
            resources:
              limits:
                memory: 128Mi

    service:
      main:
        controller: main
        ports:
          socks:
            port: 9150
