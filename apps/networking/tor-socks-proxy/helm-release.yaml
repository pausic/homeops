---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tor-socks-proxy
  namespace: networking
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      main:
        strategy: Recreate
        containers:
          main:
            image:
              repository: peterdavehello/tor-socks-proxy
              tag: latest@sha256:0cc12d36d31265ce828c8422a7e163a0bf46755e90531f4c7d38a6149f071729
            resources:
              limits:
                memory: 128Mi

    service:
      main:
        controller: main
        ports:
          socks:
            port: 9150
