apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: planka-app
  namespace: productivity
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      planka-app:
        pod:
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: ghcr.io/linuxserver/planka
              tag: 2.1.1@sha256:7c94073c4ba0cc6117804e5c13ca63d5f01676c989d1eaadc861732295b0e41c
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "SETUID", "SETGID"]
              seccompProfile:
                type: RuntimeDefault
            env:
              PUID: "1000"
              PGID: "1000"
              TZ: "Europe/Madrid"
              BASE_URL: "https://planka.${SECRET_DOMAIN}"
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: planka-app
                    key: uri
              SECRET_KEY: "${SECRET_PLANKA_KEY}"
              DEFAULT_ADMIN_EMAIL: "admin@localhost"
              DEFAULT_ADMIN_USERNAME: "admin"
              DEFAULT_ADMIN_PASSWORD: "${SECRET_PLANKA_ADMIN_PASSWORD}"
              DEFAULT_ADMIN_NAME: "Admin"
              TRUST_PROXY: "1"
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5

    service:
      planka-app:
        controller: planka-app
        ports:
          http:
            port: 1337

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        storageClass: longhorn-retain
        accessMode: ReadWriteOnce
        size: 1Gi
        advancedMounts:
          planka-app:
            app:
              - path: /config
