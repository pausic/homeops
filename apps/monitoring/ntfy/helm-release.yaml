apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ntfy
  namespace: monitoring
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      ntfy:
        containers:
          app:
            image:
              repository: binwiederhier/ntfy
              tag: v2.22.0
            args:
              - serve
            env:
              TZ: "UTC"
              NTFY_BASE_URL: "https://ntfy.${SECRET_DOMAIN}"
              NTFY_BEHIND_PROXY: "true"
              NTFY_DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: ntfy-app
                    key: uri
              NTFY_UPSTREAM_BASE_URL: "https://ntfy.sh"
              NTFY_METRICS_LISTEN_HTTP: ":9090"
              NTFY_ENABLE_WEB: "true"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /v1/health
                    port: 80
                  periodSeconds: 60
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /v1/health
                    port: 80
                  periodSeconds: 10
                  timeoutSeconds: 10
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /v1/health
                    port: 80
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                memory: 64Mi
                cpu: 100m
              limits:
                memory: 128Mi
                cpu: 500m

    service:
      app:
        controller: ntfy
        ports:
          http:
            port: 80
          metrics:
            port: 9090

    serviceMonitor:
      app:
        enabled: true
        endpoints:
          - port: metrics
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 10s

