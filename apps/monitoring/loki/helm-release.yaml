---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 15m
  chart:
    spec:
      chart: loki
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: grafana-charts
        namespace: flux-system
      version: 6.53.0
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    deploymentMode: SingleBinary

    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: loki_index_
              period: 24h

    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        storageClass: longhorn-retain
        size: 10Gi

    # Disable scalable deployment components
    read:
      replicas: 0
    write:
      replicas: 0
    backend:
      replicas: 0

    # Disable MinIO and gateway
    minio:
      enabled: false
    gateway:
      enabled: false

    # Disable caching
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false

    # Disable test and canary pods
    test:
      enabled: false
    lokiCanary:
      enabled: false

    monitoring:
      serviceMonitor:
        enabled: true
      selfMonitoring:
        enabled: false
        grafanaAgent:
          installOperator: false
