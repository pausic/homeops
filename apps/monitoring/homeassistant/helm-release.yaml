apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homeassistant
  namespace: monitoring
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      homeassistant:
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/home-assistant/home-assistant
              tag: stable
            env:
              TZ: "Europe/Amsterdam"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8123
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8123
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8123
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              privileged: false
              allowPrivilegeEscalation: false
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                memory: 1Gi

    service:
      app:
        controller: homeassistant
        ports:
          http:
            port: 8123

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        storageClass: longhorn-retain
        accessMode: ReadWriteOnce
        size: 2Gi
        advancedMounts:
          homeassistant:
            app:
              - path: /config
