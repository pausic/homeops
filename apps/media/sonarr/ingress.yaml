apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sonarr
  namespace: media
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`sonarr.${SECRET_DOMAIN}`)
      kind: Rule
      services:
        - name: sonarr
          port: 80
      middlewares:
        - name: trusted-only
          namespace: kube-system
        - name: redirect-to-https
          namespace: kube-system
  tls: {}
