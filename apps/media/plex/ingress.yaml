apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: plex
  namespace: media
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`plex.${SECRET_DOMAIN}`)
      kind: Rule
      services:
        - name: plex
          port: 32400
      middlewares:
        - name: trusted-only
          namespace: kube-system
  tls: {}
