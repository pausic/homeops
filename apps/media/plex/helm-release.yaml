apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
  namespace: media
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      main:
        strategy: Recreate
        containers:
          main:
            image:
              repository: ghcr.io/home-operations/plex
              pullPolicy: IfNotPresent
              tag: 1.43.0.10492
            env:
              TZ: "Europe/Madrid"
              PLEX_ADVERTISE_URL: "https://plex.${SECRET_DOMAIN}:443"
              PLEX_NO_AUTH_NETWORKS: "192.168.1.0/24,100.64.0.0/10"
            resources:
              requests:
                gpu.intel.com/i915: 1
              limits:
                gpu.intel.com/i915: 1
                memory: 5Gi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        supplementalGroups: [44, 993]

    service:
      main:
        controller: main
        ports:
          http:
            port: 32400

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        storageClass: longhorn-retain
        accessMode: ReadWriteOnce
        size: 7Gi
        advancedMounts:
          main:
            main:
              - path: /config
      transcode:
        enabled: true
        type: emptyDir
      tmp:
        enabled: true
        type: emptyDir
        medium: Memory
      media:
        enabled: true
        type: hostPath
        hostPath: /mnt
        advancedMounts:
          main:
            main:
              - path: /mnt
                readOnly: true
