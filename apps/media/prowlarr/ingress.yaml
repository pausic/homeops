apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prowlarr
  namespace: media
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`prowlarr.${SECRET_DOMAIN}`)
      kind: Rule
      services:
        - name: prowlarr
          port: 80
      middlewares:
        - name: trusted-only
          namespace: kube-system
  tls: {}
