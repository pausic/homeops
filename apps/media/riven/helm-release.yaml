apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: riven
  namespace: media
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      riven:
        containers:
          backend:
            image:
              repository: spoked/riven
              tag: latest
            env:
              PUID: "1000"
              PGID: "1000"
              TZ: "Europe/Madrid"
              RIVEN_API_KEY: "REDACTED"
              RIVEN_DATABASE_HOST:
                valueFrom:
                  secretKeyRef:
                    name: riven-app
                    key: uri
              RIVEN_FILESYSTEM_MOUNT_PATH: /mount
              RIVEN_UPDATERS_LIBRARY_PATH: /mnt/library
              RIVEN_LOG_LEVEL: DEBUG
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10

          frontend:
            dependsOn: backend
            image:
              repository: spoked/riven-frontend
              tag: latest
            env:
              TZ: "Europe/Madrid"
              BACKEND_URL: "http://localhost:8080"
              ORIGIN: "https://riven.tailnet.core.local"
              BACKEND_API_KEY: "REDACTED"
              DATABASE_URL: /riven/data/riven.db
              AUTH_SECRET: "REDACTED"
              RIVEN_LOG_LEVEL: DEBUG
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true

    service:
      backend:
        controller: riven
        ports:
          http:
            port: 8080
      frontend:
        controller: riven
        ports:
          http:
            port: 3000

    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        storageClass: longhorn-retain
        accessMode: ReadWriteOnce
        size: 1Gi
        advancedMounts:
          riven:
            backend:
              - path: /riven/data
                subPath: backend
            frontend:
              - path: /riven/data
                subPath: frontend
      media-mount:
        enabled: true
        type: persistentVolumeClaim
        storageClass: longhorn-retain
        accessMode: ReadWriteOnce
        size: 10Gi
        advancedMounts:
          riven:
            backend:
              - path: /mount
      media-library:
        enabled: true
        type: persistentVolumeClaim
        storageClass: longhorn-retain
        accessMode: ReadWriteOnce
        size: 10Gi
        advancedMounts:
          riven:
            backend:
              - path: /mnt/library

