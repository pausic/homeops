apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: riven
  namespace: media
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`riven.${SECRET_DOMAIN}`)
      kind: Rule
      services:
        - name: riven-frontend
          port: 3000
      middlewares:
        - name: trusted-only
          namespace: kube-system
  tls: {}
