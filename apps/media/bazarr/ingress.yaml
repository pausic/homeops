apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: bazarr
  namespace: media
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`bazarr.${SECRET_DOMAIN}`)
      kind: Rule
      services:
        - name: bazarr
          port: 6767
      middlewares:
        - name: trusted-only
          namespace: kube-system
        - name: redirect-to-https
          namespace: kube-system
