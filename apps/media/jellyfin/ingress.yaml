apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jellyfin
  namespace: media
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`jellyfin.${SECRET_DOMAIN}`)
      kind: Rule
      services:
        - name: jellyfin
          port: 8096
      middlewares:
        - name: trusted-only
          namespace: kube-system
  tls: {}
