apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: media
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      main:
        strategy: Recreate
        containers:
          main:
            image:
              repository: ghcr.io/jellyfin/jellyfin
              pullPolicy: IfNotPresent
              tag: 10.11.8
            env:
              TZ: "Europe/Madrid"
            resources:
              requests:
                gpu.intel.com/i915: 1
              limits:
                gpu.intel.com/i915: 1
                memory: 5Gi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        supplementalGroups: [44, 993]

    service:
      main:
        controller: main
        ports:
          http:
            port: 8096

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        storageClass: longhorn-retain
        accessMode: ReadWriteOnce
        size: 7Gi
        advancedMounts:
          main:
            main:
              - path: /config
      cache:
        enabled: true
        type: emptyDir
        advancedMounts:
          main:
            main:
              - path: /cache
      transcode:
        enabled: true
        type: emptyDir
      media:
        enabled: true
        type: hostPath
        hostPath: /mnt
        advancedMounts:
          main:
            main:
              - path: /mnt
                readOnly: true
