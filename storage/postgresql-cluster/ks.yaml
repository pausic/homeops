apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: postgresql-cluster
  namespace: flux-system
spec:
  dependsOn:
    - name: pgo
    - name: reflector
    - name: storage
  interval: 5m
  path: ./storage/postgresql-cluster
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
